<!--Create a form will validate the input text and display error in case of 
validation is failed -->
<!DOCTYPE html>
<html>
    <head>
        <title>User Registration Form with Error Message</title>
        <link rel="stylesheet" href="formstyle.css">
    </head>
    <body>
        <h1>User Registration</h1>
        <form action="/register" method="POST">
            <div>
                <label for="username">Username :</label>
                <input type="text" id="username" name="username" required minlength="3" maxlength="15"
                pattern="^[a-zA-Z0-9_]+$"
                title="Username must be 3-15 characters and contain only letters, numbers, or udnerscores.">
            </div>
            <div>
                <label for="email">Email :</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div>
                <label for="password">Password :</label>
                <input 
    type="password" 
    id="password" 
    name="password" 
    pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" 
    title="Must contain at least one number, one uppercase, one lowercase letter, and at least 8 or more characters" 
    required
  >
            </div>
            <div>
                <label for="age">Age(Must be 18+) :</label>
                <input type="number" id="age" name="age" min="18" max="120" required>
            </div>
            <button type="submit">Register</button>
        </form>
    </body>
</html>
