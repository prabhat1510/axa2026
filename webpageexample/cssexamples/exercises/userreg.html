<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC Order Management System - User Registration</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

    <div class="registration-box">

        <h1>ABC Order Management System</h1>
        <h2>User Registration</h2>

        <form action="#" method="post">

            <div class="form-group">
                <label for="fname">First Name</label>

                <input
                    type="text"
                    id="fname"
                    name="fname"
                    maxlength="50"
                    pattern="[A-Za-z ]{1,50}"
                    title="Only alphabets allowed. Maximum 50 characters."
                    required>
            </div>

            <div class="form-group">
                <label for="lname">Last Name</label>

                <input
                    type="text"
                    id="lname"
                    name="lname"
                    maxlength="50"
                    pattern="[A-Za-z ]{1,50}"
                    title="Only alphabets allowed. Maximum 50 characters."
                    required>
            </div>

            <div class="form-group">
                <label for="email">Email ID</label>

                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="example@gmail.com"
                    required>
            </div>

            <div class="form-group">
                <label for="mobile">Mobile Number</label>

                <input
                    type="tel"
                    id="mobile"
                    name="mobile"
                    pattern="[0-9]{10}"
                    maxlength="10"
                    minlength="10"
                    title="Enter exactly 10 digits."
                    required>
            </div>

            <div class="form-group">
                <label for="username">Username</label>

                <input
                    type="text"
                    id="username"
                    name="username"
                    pattern="[A-Za-z]{5,}"
                    minlength="5"
                    title="Only alphabets and minimum 5 characters."
                    required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>

                <input
                    type="password"
                    id="password"
                    name="password"
                    pattern="(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}"
                    title="Minimum 8 characters, at least one digit and one special character."
                    required>
            </div>

            <div class="button-group">
                <button type="submit" class="register-btn">
                    Register
                </button>

                <button type="reset" class="reset-btn">
                    Reset
                </button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
