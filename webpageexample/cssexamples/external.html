<!DOCTYPE html>
<html>
    <head>
        <title>Use of External CSS</title>
        <link rel="stylesheet" href="external.css">

    </head>
    <body>
        <h1>External CSS example of Type or Element Selector</h1>
        <p>Enjoying Type Selector</p>
        <h1>Class Selector Example</h1>
        <p class="c1">Enjoying Class Selector</p>
        <p class="c2">Oh no its not boring</p>
        <p class="c1">No worries once you practice you will enjoy it</p>
        <form>
            <label>Username: </label>
            <input type="text" id="uname" name="uname" />
            <button>Submit</button>
            <button class="c1">Reset</button>
        </form>

        <p id="p1">Will take break at 11 am </p>
        <p>Break will get over by 11:15 am </p>
        <p id="p2">Hope you all need a break !!!</p>
    </body>
</html>
