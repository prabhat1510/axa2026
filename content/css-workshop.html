<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Workshop — Learn by Editing</title>
<style>
  :root {
    --bg: #0f1620;
    --panel: #16202c;
    --panel-border: #243140;
    --text: #e7edf3;
    --text-dim: #8fa3b5;
    --accent: #5eead4;
    --accent-soft: rgba(94, 234, 212, 0.12);
    --code-bg: #0a1118;
    --mono: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
    --sans: 'Inter', 'Segoe UI', sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.5;
  }

  header.page-head {
    padding: 48px 24px 32px;
    text-align: center;
    border-bottom: 1px solid var(--panel-border);
  }

  header.page-head .eyebrow {
    color: var(--accent);
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  header.page-head h1 {
    font-size: clamp(28px, 4vw, 44px);
    margin: 0 0 8px;
    font-weight: 700;
  }

  header.page-head p {
    color: var(--text-dim);
    max-width: 560px;
    margin: 0 auto;
    font-size: 15px;
  }

  nav.toc {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    padding: 20px 24px;
    max-width: 1000px;
    margin: 0 auto;
  }

  nav.toc a {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 13px;
    font-family: var(--mono);
    padding: 6px 12px;
    border: 1px solid var(--panel-border);
    border-radius: 999px;
    transition: border-color 0.2s, color 0.2s;
  }

  nav.toc a:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  main {
    max-width: 1000px;
    margin: 0 auto;
    padding: 20px 24px 80px;
  }

  section.lesson {
    margin-top: 56px;
    padding-top: 8px;
    scroll-margin-top: 20px;
  }

  section.lesson .num {
    font-family: var(--mono);
    color: var(--accent);
    font-size: 13px;
    letter-spacing: 0.1em;
  }

  section.lesson h2 {
    margin: 4px 0 6px;
    font-size: 24px;
  }

  section.lesson .desc {
    color: var(--text-dim);
    font-size: 14.5px;
    margin: 0 0 18px;
    max-width: 680px;
  }

  .lab {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--panel-border);
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    overflow: hidden;
  }

  @media (max-width: 760px) {
    .lab { grid-template-columns: 1fr; }
  }

  .lab .editor, .lab .preview {
    background: var(--panel);
    min-height: 220px;
  }

  .lab .panel-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 10px 14px;
    border-bottom: 1px solid var(--panel-border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .lab .panel-label .reset-btn {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    background: none;
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 2px 8px;
    cursor: pointer;
    text-transform: none;
    letter-spacing: 0;
  }

  .lab .panel-label .reset-btn:hover {
    background: var(--accent-soft);
  }

  textarea.code-input {
    width: 100%;
    height: 200px;
    background: var(--code-bg);
    color: #d6e2ec;
    border: none;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    padding: 14px;
    resize: vertical;
    outline: none;
    tab-size: 2;
  }

  .preview-frame {
    padding: 18px;
    background: #fff;
    min-height: 180px;
    height: 100%;
    overflow: auto;
  }

  /* The live preview is a separate "world" so demo styles don't leak into the page */
  iframe.live-preview {
    width: 100%;
    height: 240px;
    border: none;
    background: #fff;
  }

  footer {
    text-align: center;
    padding: 30px;
    color: var(--text-dim);
    font-size: 13px;
    border-top: 1px solid var(--panel-border);
  }
</style>
</head>
<body>

<header class="page-head">
  <div class="eyebrow">Interactive CSS Workshop</div>
  <h1>Learn CSS by Editing It</h1>
  <p>Eleven core concepts, each with live, editable code on the left and a real-time rendered result on the right. Change the CSS and watch it update instantly.</p>
</header>

<nav class="toc" id="toc"></nav>

<main id="lessons"></main>

<footer>Built for hands-on CSS training &middot; edit any code box above, results update live</footer>

<script>
const lessons = [
  {
    id: "selectors",
    num: "01",
    title: "Selectors",
    desc: "Selectors decide which elements your CSS rule applies to: by tag, class, ID, relationship, attribute, or state.",
    html: `<div class="card">
  <h3>Selector Demo</h3>
  <p class="highlight">I'm targeted by a class.</p>
  <p>I'm targeted by the element selector.</p>
  <div class="card-footer">
    <button>Hover me</button>
  </div>
</div>`,
    css: `p { color: #334155; }

.highlight {
  background: #fef08a;
  padding: 4px 8px;
  border-radius: 4px;
}

.card > h3 {
  color: #2563eb;
}

button:hover {
  background: #2563eb;
  color: white;
}`
  },
  {
    id: "box-model",
    num: "02",
    title: "The Box Model",
    desc: "Every element is content, wrapped in padding, then a border, then margin. box-sizing: border-box keeps width predictable.",
    html: `<div class="box">Content area</div>`,
    css: `.box {
  width: 220px;
  padding: 20px;
  border: 4px solid #2563eb;
  margin: 20px;
  background: #dbeafe;
  box-sizing: border-box;
}`
  },
  {
    id: "display",
    num: "03",
    title: "Display Property",
    desc: "display controls how an element participates in layout: block stacks, inline flows with text, none removes it entirely.",
    html: `<div class="block-el">I'm block (full width)</div>
<span class="inline-el">I'm inline</span>
<span class="inline-el">so am I</span>
<div class="hidden-el">You can't see me (display: none)</div>`,
    css: `.block-el {
  display: block;
  background: #bbf7d0;
  margin-bottom: 8px;
  padding: 6px;
}

.inline-el {
  display: inline;
  background: #fde68a;
  padding: 2px 6px;
}

.hidden-el {
  display: none;
}`
  },
  {
    id: "flexbox",
    num: "04",
    title: "Flexbox",
    desc: "A one-dimensional layout system, ideal for navbars, toolbars, and rows or columns of items that need alignment and spacing.",
    html: `<nav class="navbar">
  <div class="logo">Brand</div>
  <div class="links">Home About Contact</div>
</nav>`,
    css: `.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 20px;
  background: #1e293b;
  color: white;
  border-radius: 8px;
}

.logo { font-weight: 700; }
.links { display: flex; gap: 16px; }`
  },
  {
    id: "grid",
    num: "05",
    title: "CSS Grid",
    desc: "A two-dimensional layout system: define rows and columns explicitly. auto-fit + minmax makes a responsive grid without media queries.",
    html: `<div class="grid">
  <div class="cell">1</div>
  <div class="cell">2</div>
  <div class="cell">3</div>
  <div class="cell">4</div>
  <div class="cell">5</div>
  <div class="cell">6</div>
</div>`,
    css: `.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
  gap: 10px;
}

.cell {
  background: #e0e7ff;
  border: 1px solid #6366f1;
  text-align: center;
  padding: 16px 0;
  border-radius: 6px;
  font-weight: 600;
}`
  },
  {
    id: "positioning",
    num: "06",
    title: "Positioning",
    desc: "static is default flow, relative shifts but keeps its space, absolute is removed from flow and positioned against an ancestor, fixed sticks to the viewport, sticky sticks within its scroll container.",
    html: `<div class="card-pos">
  Card content
  <span class="badge">New</span>
</div>`,
    css: `.card-pos {
  position: relative;
  background: #f1f5f9;
  border: 1px solid #cbd5e1;
  padding: 24px;
  border-radius: 8px;
}

.badge {
  position: absolute;
  top: -10px;
  right: -10px;
  background: #ef4444;
  color: white;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
}`
  },
  {
    id: "colors-units",
    num: "07",
    title: "Colors & Units",
    desc: "Colors can be hex, rgb, or hsl. Units like px are fixed; rem/em scale relative to font size; % and vh/vw scale relative to parent or viewport.",
    html: `<div class="swatch hex">hex</div>
<div class="swatch rgb">rgb</div>
<div class="swatch hsl">hsl</div>
<p class="rem-text">This text uses rem units</p>`,
    css: `.swatch {
  display: inline-block;
  width: 80px;
  height: 50px;
  margin: 4px;
  color: white;
  text-align: center;
  line-height: 50px;
  border-radius: 6px;
}

.hex { background: #f97316; }
.rgb { background: rgb(34, 197, 94); }
.hsl { background: hsl(210, 90%, 55%); }

.rem-text {
  font-size: 1.4rem;
  color: #334155;
}`
  },
  {
    id: "typography",
    num: "08",
    title: "Typography",
    desc: "Font family, size, weight, line-height, letter-spacing, and text-transform together define the personality and readability of text.",
    html: `<h2 class="type-heading">Heading Style</h2>
<p class="type-body">Body text demonstrating line-height and letter-spacing for comfortable reading.</p>
<p class="type-label">small label text</p>`,
    css: `.type-heading {
  font-family: Georgia, serif;
  font-weight: 700;
  font-size: 28px;
  letter-spacing: -0.5px;
  color: #1e293b;
  margin: 0 0 6px;
}

.type-body {
  font-family: 'Segoe UI', sans-serif;
  font-size: 15px;
  line-height: 1.7;
  color: #475569;
}

.type-label {
  font-family: monospace;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #94a3b8;
}`
  },
  {
    id: "transitions",
    num: "09",
    title: "Transitions & Animations",
    desc: "transition smooths a property change over time on interaction; @keyframes defines a repeatable animation sequence.",
    html: `<button class="anim-btn">Hover me</button>
<div class="spinner"></div>`,
    css: `.anim-btn {
  background: #3b82f6;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.3s ease, transform 0.2s ease;
}

.anim-btn:hover {
  background: #1d4ed8;
  transform: scale(1.08);
}

.spinner {
  width: 30px;
  height: 30px;
  margin-top: 16px;
  border: 4px solid #e2e8f0;
  border-top-color: #3b82f6;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}`
  },
  {
    id: "responsive",
    num: "10",
    title: "Responsive Design",
    desc: "Media queries apply different rules at different viewport widths. Try resizing your browser window to see this preview change at narrower widths.",
    html: `<div class="resp-grid">
  <div class="resp-cell">A</div>
  <div class="resp-cell">B</div>
  <div class="resp-cell">C</div>
</div>
<p class="resp-note">Shrink the preview pane / browser window to see columns collapse.</p>`,
    css: `.resp-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.resp-cell {
  background: #ddd6fe;
  text-align: center;
  padding: 20px 0;
  border-radius: 6px;
  font-weight: 600;
}

.resp-note {
  font-size: 12px;
  color: #94a3b8;
  margin-top: 10px;
}

@media (max-width: 480px) {
  .resp-grid {
    grid-template-columns: 1fr;
  }
}`
  },
  {
    id: "variables",
    num: "11",
    title: "CSS Variables",
    desc: "Custom properties (--name) let you define a value once and reuse it everywhere, which is the basis of theming.",
    html: `<div class="theme-card">
  <h4>Themed Card</h4>
  <button class="theme-btn">Action</button>
</div>`,
    css: `:root {
  --primary: #14b8a6;
  --spacing: 16px;
  --radius: 8px;
}

.theme-card {
  background: #f0fdfa;
  border: 2px solid var(--primary);
  padding: var(--spacing);
  border-radius: var(--radius);
}

.theme-card h4 {
  color: var(--primary);
  margin: 0 0 10px;
}

.theme-btn {
  background: var(--primary);
  color: white;
  border: none;
  padding: 8px 16px;
  border-radius: var(--radius);
  cursor: pointer;
}`
  }
];

const tocEl = document.getElementById('toc');
const lessonsEl = document.getElementById('lessons');

lessons.forEach(lesson => {
  const a = document.createElement('a');
  a.href = '#' + lesson.id;
  a.textContent = lesson.num + ' ' + lesson.title;
  tocEl.appendChild(a);

  const section = document.createElement('section');
  section.className = 'lesson';
  section.id = lesson.id;

  section.innerHTML = `
    <div class="num">${lesson.num}</div>
    <h2>${lesson.title}</h2>
    <p class="desc">${lesson.desc}</p>
    <div class="lab">
      <div class="editor">
        <div class="panel-label">
          <span>CSS — edit me</span>
          <button class="reset-btn" data-id="${lesson.id}">Reset</button>
        </div>
        <textarea class="code-input" id="css-${lesson.id}" spellcheck="false"></textarea>
      </div>
      <div class="preview">
        <div class="panel-label"><span>Live Preview</span></div>
        <iframe class="live-preview" id="frame-${lesson.id}"></iframe>
      </div>
    </div>
  `;
  lessonsEl.appendChild(section);
});

function renderFrame(lesson, cssText) {
  const frame = document.getElementById('frame-' + lesson.id);
  const doc = frame.contentDocument || frame.contentWindow.document;
  doc.open();
  doc.write(`<!DOCTYPE html><html><head><style>
    body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 4px; }
    ${cssText}
  </style></head><body>${lesson.html}</body></html>`);
  doc.close();
}

lessons.forEach(lesson => {
  const textarea = document.getElementById('css-' + lesson.id);
  textarea.value = lesson.css;
  renderFrame(lesson, lesson.css);

  textarea.addEventListener('input', () => {
    renderFrame(lesson, textarea.value);
  });
});

document.querySelectorAll('.reset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const id = btn.getAttribute('data-id');
    const lesson = lessons.find(l => l.id === id);
    const textarea = document.getElementById('css-' + id);
    textarea.value = lesson.css;
    renderFrame(lesson, lesson.css);
  });
});
</script>

</body>
</html>
